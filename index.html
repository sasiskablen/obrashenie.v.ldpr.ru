<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЛДПР - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-slate-100 min-h-screen" data-page="login">
    <main class="container-page flex items-center justify-center py-10">
      <section class="card w-full max-w-md p-6 md:p-8">
        <h1 class="text-2xl font-bold text-blue-900 text-center">🦅 Интернет-приемная ЛДПР</h1>
        <p class="text-gray-600 text-center mt-2">Вход в систему обращений граждан</p>

        <form id="loginForm" class="mt-6 space-y-4">
          <div>
            <label class="block mb-1 text-sm text-gray-700">Email</label>
            <input id="email" type="email" required class="input-field" placeholder="example@mail.ru" />
          </div>
          <div>
            <label class="block mb-1 text-sm text-gray-700">Пароль</label>
            <input id="password" type="password" required class="input-field" placeholder="Введите пароль" />
          </div>
          <button type="submit" class="btn-primary w-full">Войти</button>
        </form>

        <p id="errorBox" class="text-red-600 text-sm mt-3 hidden"></p>
        <p class="text-sm text-gray-600 mt-4 text-center">
          Нет аккаунта?
          <a href="register.html" class="text-blue-700 font-semibold hover:underline">Регистрация</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
