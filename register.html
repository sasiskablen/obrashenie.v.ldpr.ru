<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЛДПР - Регистрация</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-slate-100 min-h-screen" data-page="register">
    <main class="container-page py-8">
      <section class="card max-w-2xl mx-auto p-6 md:p-8">
        <h1 class="text-2xl font-bold text-blue-900">🦅 Регистрация в интернет-приемной</h1>
        <p class="text-gray-600 mt-2">Создайте учетную запись для отправки обращений</p>

        <form id="registerForm" class="grid md:grid-cols-2 gap-4 mt-6">
          <div class="md:col-span-2">
            <label class="block mb-1 text-sm text-gray-700">ФИО</label>
            <input id="name" required class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-sm text-gray-700">Email</label>
            <input id="email" type="email" required class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-sm text-gray-700">Телефон</label>
            <input id="phone" required class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-sm text-gray-700">Пароль</label>
            <input id="password" type="password" required minlength="6" class="input-field" />
          </div>
          <div>
            <label class="block mb-1 text-sm text-gray-700">Подтвердите пароль</label>
            <input id="passwordConfirm" type="password" required minlength="6" class="input-field" />
          </div>
          <div class="md:col-span-2">
            <label class="block mb-1 text-sm text-gray-700">Адрес (опционально)</label>
            <input id="address" class="input-field" />
          </div>
          <div class="md:col-span-2">
            <button type="submit" class="btn-primary w-full">Зарегистрироваться</button>
          </div>
        </form>

        <p id="errorBox" class="text-red-600 text-sm mt-3 hidden"></p>
        <p class="text-sm text-gray-600 mt-4">
          Уже есть аккаунт?
          <a href="index.html" class="text-blue-700 font-semibold hover:underline">Войти</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
